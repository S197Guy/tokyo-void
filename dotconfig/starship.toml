# tokyo-void Starship Config
format = "[ ](bg:#1a1b26)$username$hostname$directory$git_branch$git_status$character"

[username]
show_always = true
style_user = "bg:#1a1b26 fg:#9ece6a"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bg:#1a1b26 fg:#7aa2f7"
format = "[@$hostname]($style) "

[directory]
style = "bg:#1a1b26 fg:#e0af68"
format = "[$path]($style) "

[git_branch]
symbol = " "
style = "bg:#1a1b26 fg:#bb9af7"
format = "[on $symbol$branch]($style) "

[character]
success_symbol = "[λ ](bold fg:#9ece6a)"
error_symbol = "[λ ](bold fg:#f7768e)"
